<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Chaves.com</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      background:#000;
      overflow:hidden;
      touch-action:none;
    }
    #player{
      position:fixed;inset:0;
      background:#000;
    }
    /* O iframe ocupa 100% + extra para esconder barra do Drive */
    #vframe{
      position:absolute;
      /* sobe 60px pra cima e cresce 120px a mais — esconde barra superior e inferior do Drive */
      top:-60px;
      left:0;
      width:100%;
      height:calc(100% + 120px);
      border:none;
      display:block;
      pointer-events:none; /* bloqueia clique no iframe para não ativar os controles do Drive */
    }
    /* Camada transparente por cima — captura todos os toques */
    #overlay{
      position:absolute;
      inset:0;
      z-index:10;
      background:transparent;
    }
    /* Zonas de toque lateral */
    .tz{
      position:absolute;top:0;height:100%;width:25%;
      z-index:20;background:transparent;
      border:none;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      outline:none;
    }
    #tz-prev{left:0}
    #tz-next{right:0}
  </style>
</head>
<body>

<div id="player">
  <iframe id="vframe"
    allow="autoplay; encrypted-media; fullscreen"
    allowfullscreen>
  </iframe>
  <!-- Overlay bloqueia interação com o iframe -->
  <div id="overlay"></div>
  <!-- Zonas de toque para trocar episódio -->
  <button class="tz" id="tz-prev" aria-label="Anterior"></button>
  <button class="tz" id="tz-next" aria-label="Próximo"></button>
</div>

];

const KEY = 'chavescom_ep';
let cur = parseInt(localStorage.getItem(KEY) || '0');

const frame = document.getElementById('vframe');

function load(idx) {
  if (idx < 0) idx = EPS.length - 1;
  if (idx >= EPS.length) idx = 0;
  cur = idx;
  localStorage.setItem(KEY, cur);
  // autoplay=1, controls=0 esconde os controles do Drive
  frame.src = 'https://drive.google.com/file/d/' + EPS[cur] + '/preview?autoplay=1&controls=0';
}

function next() { load(cur + 1); }
function prev() { load(cur - 1); }

// Botões laterais
document.getElementById('tz-prev').addEventListener('click', prev);
document.getElementById('tz-next').addEventListener('click', next);

// Controle remoto / teclado
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.keyCode === 39) { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft'  || e.keyCode === 37) { e.preventDefault(); prev(); }
  if (e.key === 'ArrowUp'    || e.keyCode === 38) { e.preventDefault(); next(); }
  if (e.key === 'ArrowDown'  || e.keyCode === 40) { e.preventDefault(); prev(); }
});

// Swipe horizontal
let sx = null, sy = null;
document.addEventListener('touchstart', function(e) {
  sx = e.touches[0].clientX;
  sy = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', function(e) {
  if (sx === null) return;
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) next();
    else prev();
  }
  sx = null; sy = null;
}, {passive: true});

// Iniciar
load(cur);
