    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}

    /* SPLASH */
    #splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash img{width:110px;height:110px;border-radius:22px;margin-bottom:18px;box-shadow:0 8px 32px rgba(255,255,255,.1)}
    #splash h1{font-size:2rem;font-weight:900;letter-spacing:3px}
    #splash p{color:#555;margin-top:6px;font-size:.85rem}
    .dots{display:flex;gap:8px;margin-top:22px}
    .dots span{width:8px;height:8px;border-radius:50%;background:#fff;animation:bounce 1.2s infinite}
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}

    /* PLAYER */
    #player{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
    #vwrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    #vframe{width:100%;height:100%;max-width:calc(100vh * 16/9);max-height:calc(100vw * 9/16);border:none;display:block}

    /* TAP ZONES */
    .tz{position:absolute;top:0;height:100%;width:18%;z-index:10;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
    #tz-prev{left:0} #tz-next{right:0}
    .tz:active{background:rgba(255,255,255,.07)}
    .tz svg{opacity:0;transition:opacity .2s;pointer-events:none}
    .tz:active svg{opacity:1}

    /* BOTTOM BAR */
    #bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 100%);padding:16px 18px 30px;display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none;z-index:20;transition:opacity .35s}
    #bar.hidden{opacity:0}
    #epinfo{pointer-events:none;max-width:65%}
    #epcounter{font-size:.68rem;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
    #eptitle{font-size:1rem;font-weight:600;line-height:1.3}
    #listbtn{pointer-events:all;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);color:#fff;padding:9px 15px;border-radius:12px;font-size:.83rem;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;gap:6px;flex-shrink:0;transition:background .2s;-webkit-backdrop-filter:blur(6px)}
    #listbtn:active{background:rgba(255,255,255,.25)}

    /* SWIPE HINT */
    #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:11px 22px;border-radius:30px;font-size:.88rem;color:#fff;z-index:50;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:80%;text-align:center;border:1px solid rgba(255,255,255,.1)}
    #hint.show{opacity:1}

    /* EPISODE LIST */
    #listoverlay{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .38s cubic-bezier(.22,1,.36,1)}
    #listoverlay.open{transform:translateY(0)}
    #listhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    #listhdr h2{font-size:1.05rem;font-weight:700}
    #listhdr small{color:#555;font-size:.8rem;display:block;margin-top:2px}
    #closebtn{background:#1e1e1e;border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    #searchbox{padding:10px 18px;flex-shrink:0}
    #searchinput{width:100%;background:#111;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:10px;font-size:.93rem;outline:none}
    #searchinput::placeholder{color:#444}
    #eplist{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
    .epi{display:flex;align-items:center;padding:13px 18px;gap:12px;border-bottom:1px solid #0f0f0f;cursor:pointer;transition:background .15s;user-select:none}
    .epi:active{background:#151515}
    .epi.active{background:#141414}
    .epnum{font-size:.72rem;color:#444;width:26px;text-align:right;flex-shrink:0}
    .eptitlelist{font-size:.92rem;line-height:1.3;flex:1}
    .epi.active .eptitlelist{color:#ffe000;font-weight:600}
    .epicon{color:#ffe000;font-size:.9rem;flex-shrink:0}
  </style>
</head>

let cur=0,barTimer=null,listOpen=false;
const vframe=document.getElementById('vframe');
const epcounter=document.getElementById('epcounter');
const eptitle=document.getElementById('eptitle');
const bar=document.getElementById('bar');
const listoverlay=document.getElementById('listoverlay');
const eplistel=document.getElementById('eplist');
const searchinput=document.getElementById('searchinput');
const epcountlabel=document.getElementById('epcountlabel');
const hint=document.getElementById('hint');

function load(idx){
  cur=((idx%EPS.length)+EPS.length)%EPS.length;
  const ep=EPS[cur];
  vframe.src='https://drive.google.com/file/d/'+ep.d+'/preview';
  epcounter.textContent='Ep. '+ep.id+' de '+EPS.length;
  eptitle.textContent=ep.t;
  localStorage.setItem('lastEp',cur);
  showBar();
  updateHL();
}

function showBar(){
  bar.classList.remove('hidden');
  clearTimeout(barTimer);
  barTimer=setTimeout(()=>bar.classList.add('hidden'),4500);
}

function showHint(txt){
  hint.textContent=txt;
  hint.classList.add('show');
  clearTimeout(hint._t);
  hint._t=setTimeout(()=>hint.classList.remove('show'),1400);
}

document.getElementById('tz-prev').onclick=()=>{load(cur-1);showHint('◀ '+EPS[cur].t);};
document.getElementById('tz-next').onclick=()=>{load(cur+1);showHint(EPS[cur].t+' ▶');};

// Swipe
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(listOpen)return;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>55){
    if(dx<0){load(cur+1);showHint(EPS[cur].t+' ▶');}
    else{load(cur-1);showHint('◀ '+EPS[cur].t);}
  }
},{passive:true});

// Tap center
document.getElementById('player').addEventListener('click',e=>{
  if(e.target.closest('.tz')||e.target.closest('#listbtn'))return;
  bar.classList.contains('hidden')?showBar():(clearTimeout(barTimer),bar.classList.add('hidden'));
});

// List
document.getElementById('listbtn').addEventListener('click',openList);
document.getElementById('closebtn').addEventListener('click',closeList);

function openList(){
  listOpen=true;
  listoverlay.classList.add('open');
  renderList(EPS);
  setTimeout(()=>{const a=eplistel.querySelector('.active');if(a)a.scrollIntoView({block:'center'});},380);
}
function closeList(){
  listOpen=false;
  listoverlay.classList.remove('open');
  searchinput.value='';
}

function renderList(eps){
  epcountlabel.textContent=eps.length+' episódios';
  eplistel.innerHTML=eps.map(ep=>`
    <div class="epi${ep.id-1===cur?' active':''}" onclick="sel(${ep.id-1})">
      <span class="epnum">${ep.id}</span>
      <span class="eptitlelist">${ep.t}</span>
      ${ep.id-1===cur?'<span class="epicon">▶</span>':''}
    </div>`).join('');
}

function updateHL(){
  eplistel.querySelectorAll('.epi').forEach(el=>{
    const idx=parseInt(el.querySelector('.epnum').textContent)-1;
    const act=idx===cur;
    el.classList.toggle('active',act);
    let ic=el.querySelector('.epicon');
    if(act&&!ic){const s=document.createElement('span');s.className='epicon';s.textContent='▶';el.appendChild(s);}
    else if(!act&&ic)ic.remove();
  });
}

window.sel=function(idx){load(idx);closeList();};

searchinput.addEventListener('input',()=>{
  const q=searchinput.value.toLowerCase().trim();
  renderList(q?EPS.filter(e=>e.t.toLowerCase().includes(q)):[...EPS]);
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(listOpen)return;
  if(e.key==='ArrowLeft')load(cur-1);
  if(e.key==='ArrowRight')load(cur+1);
});

// Init
const saved=localStorage.getItem('lastEp');
load(saved?parseInt(saved):0);

window.addEventListener('load',()=>setTimeout(()=>document.getElementById('splash').classList.add('hidden'),1600));

// SW

</script>
