  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chaves.com" />
  <title>Chaves.com</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      background:#000;
      overflow:hidden;
    }
    /* Player ocupa 100% da tela, vídeo preenche tudo */
    #player{
      position:fixed;inset:0;
      background:#000;
    }
    #vframe{
      position:absolute;
      top:0;left:0;
      width:100%;height:100%;
      border:none;
      display:block;
    }
    /* Zonas de toque invisíveis para swipe / toque lateral */
    .tz{
      position:absolute;top:0;height:100%;width:20%;
      z-index:10;background:transparent;
      border:none;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      outline:none;
    }
    #tz-prev{left:0}
    #tz-next{right:0}
  </style>
</head>

<div id="player">
  <!-- autoplay=1 | mute=0 | controls=0 | rel=0 | modestbranding=1 -->
  <iframe id="vframe"
    allow="autoplay; encrypted-media; fullscreen"
    allowfullscreen>
  </iframe>
  <!-- Toque na borda esquerda = episódio anterior -->
  <button class="tz" id="tz-prev" aria-label="Anterior"></button>
  <!-- Toque na borda direita = próximo episódio -->
  <button class="tz" id="tz-next" aria-label="Próximo"></button>
</div>

];

const KEY = 'chavescom_ep';
let cur = parseInt(localStorage.getItem(KEY)||'0');

function load(idx, autoplay){
  if(idx < 0) idx = EPS.length - 1;
  if(idx >= EPS.length) idx = 0;
  cur = idx;
  localStorage.setItem(KEY, cur);
  const ep = EPS[cur];
  // autoplay=1 muda o vídeo automaticamente
  const src = `https://drive.google.com/file/d/${ep.d}/preview?autoplay=${autoplay?1:1}`;
  document.getElementById('vframe').src = src;
}

function next(){ load(cur+1, true); }
function prev(){ load(cur-1, true); }

// Toque nos lados
document.getElementById('tz-prev').addEventListener('click', prev);
document.getElementById('tz-next').addEventListener('click', next);

// Teclado / controle remoto (setas)
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowRight' || e.keyCode === 39){ e.preventDefault(); next(); }
  if(e.key === 'ArrowLeft'  || e.keyCode === 37){ e.preventDefault(); prev(); }
});

// Swipe horizontal
let sx = null;
document.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', function(e){
  if(sx === null) return;
  const dx = e.changedTouches[0].clientX - sx;
  if(Math.abs(dx) > 60){
    if(dx < 0) next();
    else prev();
  }
  sx = null;
}, {passive:true});

// Iniciar no último episódio salvo, com autoplay
load(cur, true);
