<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaves.com</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    #player {
      position: fixed; inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #vid {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
    /* Zonas de toque laterais para troca de episódio */
    .tz {
      position: absolute; top: 0; height: 100%; width: 20%;
      z-index: 20; background: transparent;
      border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    #tz-prev { left: 0; }
    #tz-next { right: 0; }

    /* OSD - número do episódio */
    #osd {
      position: absolute; top: 16px; right: 20px;
      color: rgba(255,255,255,0.7);
      font-family: sans-serif; font-size: 18px;
      z-index: 30;
      text-shadow: 0 1px 4px #000;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    #osd.hidden { opacity: 0; }

    /* Tela de erro */
    #err {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      background: #000; color: #fff;
      font-family: sans-serif; font-size: 20px;
      z-index: 50; text-align: center; padding: 24px;
    }
    #err.show { display: flex; }
    #err button {
      margin-top: 8px; padding: 12px 32px;
      font-size: 18px; border-radius: 8px;
      background: #e50; color: #fff; border: none; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="player">
  <video id="vid"
    autoplay
    playsinline
    webkit-playsinline
    x5-playsinline
    x5-video-player-type="h5"
    x5-video-player-fullscreen="true"
    preload="auto"
    controls>
  </video>
  <div id="osd">Ep 1</div>
  <button class="tz" id="tz-prev"></button>
  <button class="tz" id="tz-next"></button>
  <div id="err">
    <span id="err-msg">Não foi possível carregar o vídeo.</span>
    <button onclick="retryLoad()">Tentar novamente</button>
    <button onclick="next()">Próximo episódio</button>
  </div>
</div>

const KEY='chavescom_ep';
let cur = parseInt(localStorage.getItem(KEY)||'0');
const vid = document.getElementById('vid');
const osd = document.getElementById('osd');
const errDiv = document.getElementById('err');
const errMsg = document.getElementById('err-msg');
let osdTimer = null;

// Monta URL de streaming direto do Google Drive
// Formato que força o player nativo a usar o arquivo de vídeo diretamente
function driveUrl(id) {
  // uc?export=download faz redirect direto para o stream do arquivo
  // o parâmetro confirm=t pula a tela de aviso de arquivo grande
  return 'https://drive.usercontent.google.com/download?id=' + id + '&export=download&confirm=t&authuser=0';
}

function showOsd() {
  osd.textContent = 'Ep ' + (cur + 1);
  osd.classList.remove('hidden');
  clearTimeout(osdTimer);
  osdTimer = setTimeout(() => osd.classList.add('hidden'), 3000);
}

function load(idx) {
  if (idx < 0) idx = EPS.length - 1;
  if (idx >= EPS.length) idx = 0;
  cur = idx;
  localStorage.setItem(KEY, cur);
  errDiv.classList.remove('show');
  vid.src = driveUrl(EPS[cur]);
  vid.load();
  vid.play().catch(() => {});
  showOsd();
}

function next() { load(cur + 1); }
function prev() { load(cur - 1); }
function retryLoad() { load(cur); }

// Auto-avança para o próximo episódio
vid.addEventListener('ended', next);

// Erro de carregamento
vid.addEventListener('error', function() {
  errMsg.textContent = 'Erro ao carregar Ep ' + (cur+1) + '. Verifique a conexão.';
  errDiv.classList.add('show');
});

// Toque nas zonas laterais
document.getElementById('tz-prev').addEventListener('click', prev);
document.getElementById('tz-next').addEventListener('click', next);

// Teclado / controle remoto TV Box
// D-Pad: 37=esq, 38=cima, 39=dir, 40=baixo
// Media keys: 179=play/pause, 176=next, 177=prev
// HDMI CEC / Android TV: MediaNext=87, MediaPrev=88, MediaPlay=126, MediaPause=127
document.addEventListener('keydown', function(e) {
  switch(e.keyCode) {
    case 37: case 177: case 88: // Esquerda / MediaPrev
      e.preventDefault(); prev(); break;
    case 39: case 176: case 87: // Direita / MediaNext
      e.preventDefault(); next(); break;
    case 38: case 40: // Cima/Baixo — mostrar OSD
      e.preventDefault(); showOsd(); break;
    case 179: case 32: case 13: // Play/Pause / Enter
      e.preventDefault();
      if (vid.paused) vid.play(); else vid.pause();
      showOsd(); break;
  }
});

// Swipe touch
let sx = null, sy = null;
document.addEventListener('touchstart', function(e) {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', function(e) {
  if (sx === null) return;
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    dx < 0 ? next() : prev();
  }
  sx = null; sy = null;
}, {passive: true});

// Iniciar
load(cur);
</script>
